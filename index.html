<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Analyze the time and space complexity of your code with instant insights, suggestions, and optimized alternatives.">
  <title>Code Complexity Analyzer</title>

  <!-- Google Fonts: Inter for UI, Fira Code for code -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">

  <!--<link rel="stylesheet" href="/static/style.css">-->
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Animated background orbs -->
  <div class="bg-orb bg-orb--1" aria-hidden="true"></div>
  <div class="bg-orb bg-orb--2" aria-hidden="true"></div>
  <div class="bg-orb bg-orb--3" aria-hidden="true"></div>

  <!-- Main card -->
  <main class="card" id="main-card">

    <!-- Header -->
    <header class="card__header">
      <div class="card__icon" aria-hidden="true">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="16 18 22 12 16 6"></polyline>
          <polyline points="8 6 2 12 8 18"></polyline>
        </svg>
      </div>
      <h1 class="card__title">Code Complexity Analyzer</h1>
      <p class="card__subtitle">Paste your source code below and get instant complexity insights</p>
    </header>

    <!-- Code input area -->
    <section class="input-section">
      <label for="code-input" class="input-label">Source Code</label>
      <textarea
        id="code-input"
        class="code-textarea"
        rows="14"
        placeholder="// Paste your code here...&#10;&#10;def example(n):&#10;    for i in range(n):&#10;        for j in range(n):&#10;            print(i, j)"
        spellcheck="false"
      ></textarea>
      <div class="input-meta">
        <span class="input-meta__lang">Python &bull; Auto-detect</span>
        <span class="input-meta__lines" id="line-count">0 lines</span>
      </div>
    </section>

    <!-- Analyze button -->
    <button id="analyze-btn" class="btn-analyze" type="button">
      <span class="btn-analyze__icon" aria-hidden="true">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"></circle>
          <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
        </svg>
      </span>
      <span class="btn-analyze__text">Analyze Code</span>
      <span class="btn-analyze__loader" id="btn-loader" aria-hidden="true"></span>
    </button>

    <!-- Results / Output panel -->
    <section class="results" id="result" aria-live="polite">
      <!-- JS will inject result cards here -->
    </section>
    <div id="history"></div>
  </main>

  <!--<script src="/static/script.js"></script>-->
  <script src="script.js"></script>
</body>
</html>
